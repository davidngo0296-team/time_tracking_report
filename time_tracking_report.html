<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Time Tracking Report</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="container">
        <h1>Time Tracking Report</h1>

        <!-- Ticket Management Modal -->
        <div id="ticket-modal" class="modal-overlay">
            <div class="modal-content" style="border-left: 5px solid #2ecc71; max-width: 600px;">
                <div class="modal-header" style="color: #27ae60;">Manage Tickets</div>
                <div class="modal-body">
                    <div class="ticket-controls">
                        <div class="ticket-input-group">
                            <input type="text" id="new-ticket-input" placeholder="Enter Ticket ID (e.g. 29AFC7) or URL">
                            <button class="add-btn" onclick="addTicketFromInput()">Add</button>
                        </div>

                        <div id="ticket-list" class="ticket-list">
                            <!-- Ticket tags will be injected here -->
                        </div>
                        <div style="font-size: 0.8em; color: #7f8c8d;">
                            * Manage the tickets you want to track here. This list is saved in your browser.
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="modal-btn" onclick="closeTicketModal()" style="background: #95a5a6;">Close</button>
                </div>
            </div>
        </div>

        <div class="risk-controls">
            <label for="dev-days">Remaining Dev Days:</label>
            <input type="number" id="dev-days" min="0" placeholder="e.g. 5">
            <button class="risk-btn" onclick="checkRisk()">Check Risk</button>
        </div>

        <!-- Floating Action Buttons -->
        <div class="floating-actions">
            <button id="clear-token-btn" class="clear-token-btn" onclick="clearToken()" title="Clear saved API token">
                🔑 Clear Token
            </button>
            <button id="manage-btn" class="manage-btn" onclick="openTicketModal()">
                📋 Manage Tickets
            </button>
            <button id="update-btn" class="update-btn" onclick="updateData()">
                🔄 Update Data
            </button>
        </div>

        <div id="risk-report"></div>

        <div id="report-container"></div>

        <div id="global-stats" class="enhancement-section" style="margin-top: 40px;">
            <h2>Total Time Left by Team (Latest: <span id="global-date-display"></span>)</h2>
            <div id="team-charts-container" class="charts-container" style="flex-wrap: wrap;">
                <!-- Team pie charts will be injected here -->
            </div>
        </div>

        <div id="no-eta-section" class="enhancement-section" style="margin-top: 40px;">
            <h2>&#9888; No ETA (Latest: <span id="no-eta-date-display"></span>)</h2>
            <p style="color: #666; margin-bottom: 15px;">Tasks without an estimated completion date, grouped by
                enhancement.</p>
            <div id="no-eta-container">
                <!-- No ETA tickets will be injected here -->
            </div>
        </div>
    </div>

    <!-- Error Modal -->
    <div id="error-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">Update Failed</div>
            <div class="modal-body" id="modal-message"></div>
            <div class="modal-footer">
                <button class="modal-btn" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- JavaScript Files -->
    <script src="chart-utils.js"></script>
    <script src="app.js"></script>
</body>

</html>
